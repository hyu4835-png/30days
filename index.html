    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen&display=swap');
        
        @font-face {
            font-family: 'CleanDot';
            src: local('Pretendard'), local('Apple SD Gothic Neo'), local('Malgun Gothic'), local('sans-serif');
            unicode-range: U+002E, U+002C;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            user-select: none;
        }

        .pixel-border {
            border: 1px solid white;
            box-shadow: 0 -1px 0 0 black, 0 1px 0 0 black, -1px 0 0 0 black, 1px 0 0 0 black;
        }

        .pixel-btn {
            position: relative;
            display: inline-block;
            padding: 10px 20px;
            background: #fff;
            color: #000;
            border: 1px solid #000;
            transition: all 0.1s;
            cursor: pointer;
        }

        .pixel-btn:active {
            transform: translate(1px, 1px);
            background: #ddd;
        }

        .dialogue-box {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid white;
            box-shadow: inset -1px -1px 0 0 #555;
        }

        .animate-blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        @keyframes mapNodePulse {
            0%, 100% { fill: #22c55e; stroke: #fff; }
            50% { fill: #166534; stroke: #22c55e; }
        }
        .map-active-node { animation: mapNodePulse 1.5s infinite; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fff; border: 1px solid #111; }

        .fade-in-screen { animation: fadeIn 0.8s ease-in-out forwards; }
        /* 최종 엔딩 이미지용 긴 페이드 인 */
        .fade-in-final { animation: fadeIn 2.5s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const EPILOGUE_DIALOGUES = [
            "무겁게 가라앉은 눈꺼풀을 겨우 들어올렸다.",
            "자연스럽게 천장으로 향한 눈동자가 주변을 훑는다.",

            "'전화 안 받을 때부터 뭔가 이상했어. 이젠 리그에 물어보기도 뭐하고, 소식을 들을 곳이 없어서 얼마나 초조했는데.'",

        const ITEMS = [
            { id: 1, scene: 1, subSceneIdx: 0, name: "헌화용 국화", description: "탐스럽고 싱그러운 빛을 유지하고 있는 헌화용 국화. 꽃잎에는 약간 물기가 어려있다. 마치 사자의 마지막 남은 생기를 빨아들인 것처럼 생생하다. 그렇다면 이 물기는 생명이 다한 사자의 눈물이라고도 할 수 있지 않을까. 어찌되었든, 자신에게 바쳐진 꽃이 기뻐 흘린 눈물은 아닐 것이다.", image: "https://i.ibb.co/gFdyxsC9/1.png", pos: { top: '40%', left: '30%' }, dialogues: ["하얀 천이 덮인 관 앞에 수북히 쌓인 꽃이 보인다.", "나 또한 가지고 있던 꽃을 내려놓았다."] },
            { id: 2, scene: 1, subSceneIdx: 1, name: "먹다 남은 음식", description: "장례식장에서 제공되는 음식치고는 꽤 고급인 식재료로 만든 태가 나지만, 입을 댄 흔적 하나 없는 도시락이다. 옆에는 다 식은 녹차가 놓여있다. 잔잔한 녹차 표면에 흐릿한 모양으로 얼굴이 비친다. 무슨 표정인지 전혀 종잡을 수가 없어 눈을 떼고, 다시 뚜껑을 덮었다. 다시 열어볼 일이 없을 것 같다. ", image: "https://i.ibb.co/N62h4PtF/2.png", pos: { top: '50%', left: '70%' }, dialogues: ["테이블 위는 일회용품과 흘린 음식들로 흐트러져 있다.", "아마 치우려면 품이 꽤 많이 들 것이다."] },
            { id: 3, scene: 1, subSceneIdx: 2, name: "두고 온 물건", description: "먼 과거로부터 온 물건. 옥과 귀한 돌, 자개가 쓰인 것 같지만 지금에 와서도 정확히 무엇으로 이루어져 있는지는 잘 모른다. 돌과 키스톤 부분의 생채기가 자세히 보려 들지 않아도 보인다. 그의 것치고는 사용감이 꽤 느껴진다는 감상이다. 국화가 사자의 생기를 흡수한다는 건 아마 진실일 것이라는 생각이 언뜻 들었다. 그렇지 않으면 그렇게 빛나던 이 팔찌가 이렇게 고요할 리 없다.", image: "https://i.ibb.co/FkbRgBkR/3.jpg", pos: { top: '60%', left: '40%' }, dialogues: ["이것을 찾으러 왔었다.", "이런 것을 잊을 뻔하다니.", "잃어버리지 않게 넣어두자, 고 생각하던 찰나 그런 생각이 들었다.", "이제 누구의 것도 되지 못하는 물건인데.", "잃어버리지 않는다고 해도...."] },
            { id: 4, scene: 2, subSceneIdx: 0, name: "냉장고", description: "선물받은 나무열매들의 중심부에 하얗고 파란 곰팡이들이 피어있다. 남은 반찬과밥을 담아둔 통을 꺼내보면 그곳에도 마찬가지로 곰팡이들은 피어있다. 가장 위에 있는 플라스틱 통을 꺼내 열어보았다. 반쯤 먹은 밥이 들어있다. 더 먹을 사람도 없는 김에 전부 버리기로 했다. 냉장고는 이내 깨끗해진다. 퀴퀴한 곰팡이 냄새만이 감돌았던 것도, 문을 닫아버리면 금세 지워진다.", image: "https://i.ibb.co/Kx69bFDx/4.jpg", pos: { top: '35%', left: '90%' }, dialogues: ["가까이 다가가 손잡이를 잡자마자 묘한 냄새가 풍기기 시작한다.", "그럴 법도 하다.", "아마 손대지 않은 음식들이 썩어가고 있을 것이다.", "문을 열었다."] },
            { id: 5, scene: 2, subSceneIdx: 0, name: "테이블", description: "그 일이 일어나기 며칠 전에도 그는 병원에 입원을 했다. 사유는 언제나와 비슷했다. 약간 마른 그를 업고 집에 돌아왔던 기억이 있다. 특별할 것 없는 기억이 있다. 몇 번이고 그러하였으니. 그는 자신이 없는 날이면 집에서 홀로 무엇을 하고 있었던 걸까. 물어봐도 제대로 대답해주지 않으니 여태 알게 된 일은 없었다. 기다리는 사람 같은 건 없었을 텐데. ", image: "https://i.ibb.co/gF7S4pgF/5.jpg", pos: { top: '50%', left: '80%' }, dialogues: ["먼지가 앉은 테이블 위는 약간 희끄무레하다.", "쌓여있는 서류들에 눈길이 간다.", "병원 입퇴원 서류와 부재로 전달받은 석영리그의 회의록.", "그것들을 주워들었다."] },
            { id: 6, scene: 2, subSceneIdx: 1, name: "옷장", description: "청소의 사유는 계절이 아니라 부재에 있어야 한다는 사실을 자각하지 못했다. 의도한 것은 아니었다. 정말로 그렇게 생각할 수 없었고, 생각할 필요도 느끼지 못했다. 그저 무덤처럼 쌓여있는 검은 티셔츠들을 바라보았다. 색채 하나 없는 것들을 하나 둘 눈에 담을 때마다 제 색채 또한 하나 둘 사라져가는 것만 같은 착각이 든다.", image: "https://i.ibb.co/BVGDHgF5/6.jpg", pos: { top: '60%', left: '50%' }, dialogues: ["계절이 지나가지 않았으니 청소할 만한 것은 얼마 없을 것이다.", "손잡이를 잡아당겼다."] },
            { id: 7, scene: 2, subSceneIdx: 2, name: "침대", description: "그날의 기억이 떠오른다. 언제나와 같이 이른 아침이었다. 자는 척 눈을 감은 그를 내버려두고 홀로 은빛산에 올랐다가, 항상 하는 준비를 거쳐 리그에 출석할 준비를 마쳤다. 그때쯤 깨어난 그를 보고 의아하다는 표정을 지었다. 이 시간에도 자고 있을 터였는데. 싫은 소리라도 할까 싶어 가만히 바라보고 있으면 그는 예상과는 다른 말을 했다. 그게 무엇이었냐면―", image: "https://i.ibb.co/0R1HCKCB/7.jpg", pos: { top: '60%', left: '50%' }, dialogues: ["개어지지 않은 이불 위에 그대로 앉았다.", "나무 바닥도 아닌데 한기가 피부를 누르고, 억지로 벌려 그 틈을 비집고 들어온다.", "사람의 체온으로 데워질 일은 없을 거라고 생각한다."] },
            { id: 8, scene: 3, subSceneIdx: 0, name: "서랍", description: "그의 것과 달리 자신의 장갑은 매우 금방 닳는 편이었다. 산을 오르고 무거운 것을 옮기고, 몸을 자주 움직이는 편이었으니 금방 닳는 것도 당연하다. 하여 제 서랍에는 항상 여분의 장갑이 놓여있다. 같은 모양, 같은 사이즈, 같은 색. 마침 남은 것은 딱 하나다. 이제는 더 채우지 않아도 될 것 같다.", image: "https://i.ibb.co/ksFwdbqP/8.jpg", pos: { top: '80%', left: '30%' }, dialogues: ["의자를 잠시 바라보았다.", "자신의 자리가 아닌 것 같다.", "그래서 앉지 않았다.", "대신 서랍을 열었다.", "드르륵 하는 소리가 차갑다."] },
            { id: 9, scene: 3, subSceneIdx: 0, name: "소파", description: "리그의 일원이 아니면서도 그는 때때로 자신의 집무실에 들어와 제 집처럼 누워있었다. 하는 말이라고는 제 배틀에 대한 박한 평가뿐이었지만, 그것이 도움이 되지 않는 것은 아니었다. 가끔 말없이 제 배틀을 보고 돌아갈 때도 있었다. 그저 심심했던 것인가. 사실 자신이 없는 집에서 그는 아무것도 하지 않고 있었을 지도 모른다. 그러니 이곳에 온 거겠지. 제 배틀의 답답함을 감수하면서까지도.", image: "https://i.ibb.co/k2KFgww8/9.jpg", pos: { top: '80%', left: '90%' }, dialogues: [".......", "순간 멈칫했다.", "그가 있을 리 없는데.", "그가 없는 것보다 있는 것이 익숙해 일어난 일이다.", "이제는 없는 것에 익숙해질 때다."] },
            { id: 10, scene: 3, subSceneIdx: 1, name: "배틀코트", description: "호각 소리와 함께 배틀이 시작되었다. 자신의 뜻을 읽은 포켓몬들은 떨떠름하게 굴면서도 아무런 공격을 하지 않았다. 방어도 시늉 뿐이었다. 이브이만이 얼토당토 않은 명령에 화를 냈지만 그뿐이었다. 십 분도 채 되지 않아 여섯 마리 모두가 쓰러졌다. 배틀코트에는 정적이 감돌았다.", image: "https://i.ibb.co/DfWgnNJV/10.png", pos: { top: '90%', left: '40%' }, dialogues: ["자신을 부르는 소리가 들린다.", "대기해달라는 요청이었다.", "그저 그런 실력의 트레이너였던 것 같은데.", "운이 좋았던 것인가.", "...딱히 상관 없다는 생각이 든다.", "오늘 이곳에서 새로운 챔피언이 생기는 것은 기정 사실이니까."] },
            { id: 11, scene: 4, subSceneIdx: 0, name: "소파", description: "석영리그로부터 일파만파 퍼져나간 소문에 걱정스러운 얼굴로 자신을 찾은 것은 선생님과 스승이었다. 몸 상태가 그렇게 망가지지 않은 것에 안도하며 앉아 그런 이야기들을 했다. 시간이 지나면 나아질 거라는 그런 이야기는 하지 않겠다고. 언제가 되어도 괜찮으니 돌아오라고. 그 말에는 그저 그러겠다는 말로 대답했지만... 돌아오라는 말에는 왠지 머리가 멍해질 수밖에 없었다. 가라르로도 히스이로도 갈 생각을 해본 적이 없다. 마치 이곳에 못이 박힌 것처럼. 그건 언제부터였을까.", image: "https://i.ibb.co/hxJyztxm/10.jpg", pos: { top: '60%', left: '10%' }, dialogues: ["여러 사람이 앉아있던 흔적이 선명하다.", "방금 전 있었던 일이 떠오른다."] },
            { id: 12, scene: 4, subSceneIdx: 0, name: "테이블", description: "봉투 안에 담긴 과일과 영양제 따위들을 꺼내 하나 둘 테이블 위에 올려두었다. 걱정의 표시인 것 같다. 선생님으로부터 받은 것들을 버릴 수는 없어 그대로 두었다. 문득 눈을 돌리면 깔끔하게 씻어져 물기가 어린 접시들이 테이블 위를 차지하고 있다. 오랜만에 남이 해준 밥을 먹었던 것 같다. 아무런 맛이 느껴지지 않았었다. 물론 그런 말을 입밖으로 꺼내지는 않았지만.", image: "https://i.ibb.co/W4RkDKcz/13.png", pos: { top: '50%', left: '80%' }, dialogues: ["먼지가 깨끗하게 닦여있다.", "쌓여있는 병원 서류는 저만치 치워뒀고 리그의 회의록은 버렸다.", "그 위를 대신하고 있는 것은 묵직한 봉투다.", "봉투를 열었다."] },
            { id: 13, scene: 4, subSceneIdx: 1, name: "침대", description: "다시 그날의 기억이 떠오른다. 신경에 각인된 버릇처럼. 계속해서 그날의 기억을 되새기게 된다. 이렇게 곱씹어봤자 형체도 없는 기억이 어떠한 모양이 되어 자신의 옆자리를 채워주거나 하지는 않을 텐데.", image: "https://i.ibb.co/0R1HCKCB/7.jpg", pos: { top: '60%', left: '50%' }, dialogues: ["움직일 힘이 없다.", "힘이 없다....", "그런가.", "힘이 없는 상태라는 건 이런 느낌인가.", "멍하니 천장을 올려다보았다."] },
            { id: 14, scene: 5, subSceneIdx: 0, name: "휴대폰", description: "보호자를 찾는 딱딱한 어투의 메시지다. 짧은 몇 문장이지만 잘 읽히지 않는다.", image: "https://i.ibb.co/0VV6LHTg/14.jpg", pos: { top: '60%', left: '20%' }, dialogues: ["휴대폰을 주워들었다.", "메시지 창을 클릭한다.", "눈으로 그것을 읽으면서 걸음을 옮겼다.", "아주 빠른 속도로."] },
            { id: 15, scene: 5, subSceneIdx: 1, name: "마론", description: "의사의 입에서 떨어진 말로도, 차게 식은 그의 몸을 두 눈으로 목도해도 그의 죽음이 실감나지는 않았다. 믿고 싶지 않아서 부정한다기보단.... 그렇다. 그냥 실감나지 않는다, 그 말로만 설명됐다. 그의 얼굴 위로 하얀 천이 덮지고, 의사가 자신에게 지금의 상황에 대한 경위를 뒤늦게 말해와도. 아무것도 들리지 않았다. 세상이 멈춘 것처럼.", image: "https://i.ibb.co/m5HNnNXF/15.png", pos: { top: '70%', left: '30%' }, dialogues: [".......", "눈이 마주치지 않는다.", "머리에 말라붙은 피를 바라본다.", "하얗게 식은 피부 위에 있으니 더 대비되는 색이다.", "미동 하나 없이 누워있는 그를 바라보고 있으면, 옆에 서있던 의사가 매우 가라앉은 목소리로 입을 연다."] },
            { id: 16, scene: 6, subSceneIdx: 0, name: "세레비", description: "어디선가 나타나 포르르 날아든 세레비가 주변을 몇 번 돈다. 자신에게 일어난 일을 알고 있는 건지, 홀로인 자신을 의아하게 생각한 건지... 분위기가 평소와는 달랐지만, 제가 무엇을 원하는 건지 알고는 있는 듯 여러 번 드나들었던 시간의 문을 연다.", image: "https://i.ibb.co/GQLyTJt0/16.png", pos: { top: '65%', left: '40%' }, dialogues: ["약간 낡았지만 잘 관리된 작은 사당이다.", ".......", ".......", "가만히 그를 기다린다."] },
            { id: 17, scene: 7, subSceneIdx: 0, name: "향", description: "익숙한 탄내는 마음을 가라앉힌다. 가볍게 손을 모은다. 겨울 서리가 앉은 매화의 내음과 타들어가는 향, 막 잘린 잡초의 드센 풀향은 히스이의 모습을 쉽게 그려낸다.", image: "https://i.ibb.co/ZQnHh6p/17.jpg", pos: { top: '70%', left: '50%' }, dialogues: ["가느다란 향을 몇 개 꽂는다.", "자연스럽게 불을 붙였다."] },
            { id: 18, scene: 7, subSceneIdx: 0, name: "비석", description: "정자체로 반듯하게 쓰인 '氷雨崎' 밑에 '英樹'와 '弓子'가 나란히 쓰여있다. 친부와 친모의 이름이다. 히사메자키 가문의 가족묘. 몇 년 전에는 이 옆에 막 만든 구덩이가 있었다. 실종된 자신을 기다리지 못한 가신들이 만들어둔 형식상의 무덤이었다. 지금은 서리에도 살아남는 들꽃 무더기가 피어 흔적도 남지 않은 상태다.", image: "https://i.ibb.co/Y48bxQbD/18.png", pos: { top: '40%', left: '35%' }, dialogues: ["흙먼지가 앉아 누렇게 변한 비석을 마른 천으로 문질러 닦는다.", "부드럽지는 않지만 그렇다고 날카롭지도 않은 시선이 낯설지 않은 비석의 문을 읽어내린다."] },
            { id: 19, scene: 7, subSceneIdx: 1, name: "팔찌 가판대", description: "언젠가 그에게 주었던 것과 비슷한 모양의 팔찌를 팔고 있다. 나의 소중한 ■■■에게 주었던 ■■의 상징. 그러나, 지금은 그것의 부재를 증명하므로 그 쓸모를 증명하지 못하게 된 하나.", image: "https://i.ibb.co/nVKsxHm/19.png", pos: { top: '40%', left: '85%' }, dialogues: ["웅성이는 사람들이 매우 많다.", "즐거움에 젖은 얼굴들이 대부분이다.", "그 날은 수백 년 만에 찾아온 여름이었어서, 눈이 다 녹았었는데.", "오늘은 평범하게 이곳저곳에 눈이 얕게 쌓인 겨울의 풍경이다.", "그럼에도 따뜻한 주홍빛 불빛들은 확실하게 오늘이 축제라는 사실을 알린다."] },
            { id: 20, scene: 7, subSceneIdx: 2, name: "■■", description: "그는 없다. 이곳이 히스이라면 더. 없는 것이 당연하다.", image: "https://i.ibb.co/XxBqmsYx/20.png", pos: { top: '50%', left: '50%' }, dialogues: ["거기서 뭐해.", ".......", ".......", "고개를 돌렸다.", "분명 있을 것 같았는데.", "제 앞에도, 뒤에도...."] },
            { id: 21, scene: 8, subSceneIdx: 0, name: "찢어진 커튼", description: "어떤 정신으로 그런 선택을 하려고 했는지는 사실 잘 기억나지 않는다. 그저 삶을 이어나갈 의지보다 삶을 포기하는 의지 쪽에 조금 더 무게가 실렸기 때문이리라. 그뿐일 것이다.", image: "https://i.ibb.co/gFQhcJJ5/21.png", pos: { top: '90%', left: '80%' }, dialogues: [".......", "가만히 그것을 바라본다.", "흐릿한 어제의 이야기다."] },
            { id: 22, scene: 8, subSceneIdx: 0, name: "옷", description: "늘상 입던 그의 옷. 평범한 검은색 티셔츠다. 약간 먼지가 앉았지만 세탁할 생각은 들지 않는다. 결국 남는 것은 공허뿐인 것이다.", image: "https://i.ibb.co/xcn6q3Y/22.png", pos: { top: '90%', left: '10%' }, dialogues: ["여전히 치우지 못하고 남겨둔 그의 흔적.", "점점 부재를 증명하는 것들만이 선명해진다.", "반대편에 서있는 존재를 증명하는 것들은 서서히 사라지며.", "...그러나 부재를 증명하는 존재들은 제게 있어 '존재하는 것'이 아니므로.", "결국 남는 것은 공허뿐인 것이다."] },
            { id: 23, scene: 8, subSceneIdx: 0, name: "침대", description: "좋아했던 것들이 많았던 히스이는 더이상 자신을 품어줄 수 없는 곳이 되었다. 점점 그곳이 싫어진다. 자신이 존재할 수 있는 곳이 어디에도 없는 것 같았다. 돌아갈 곳은 어디에도 없다.", image: "https://i.ibb.co/0R1HCKCB/7.jpg", pos: { top: '60%', left: '50%' }, dialogues: ["다시 침대에 눕는다.", "이제는 온기보다 익숙한 한기가 몸을 감싼다.", "그러나 공허는 익숙해질 기미가 없다.", "느릿하게 제 목 부분을 만지작거린다.", "몸 전체를 짓누르는 무거움, 그러면서도 붕 뜨는 것만 같은 감각.", "어느 하나 맞물리는 부분이 없어 어색하다.", "그러고 있자면 또다시 떠오르는 건 그의 기억이다.", "언제나와 같이."] },
            { id: 24, scene: 9, subSceneIdx: 0, name: "전화", description: "발신자는 역시나 선생님. 부재중 전화가 가득 쌓여있는 알림창을 잠시 바라본다. 전화는 받지 않았다.", image: "https://i.ibb.co/0VV6LHTg/14.jpg", pos: { top: '60%', left: '20%' }, dialogues: ["전화벨이 울린다."] },
            { id: 25, scene: 10, subSceneIdx: 0, name: "칼", description: "달빛을 머금은 칼날이 차갑게 빛난다. 모든 것을 끝내기에 이보다 더 좋은 도구는 없을 것이다.", image: "https://i.ibb.co/s007m53/23.png", pos: { top: '70%', left: '20%' }, dialogues: ["칼을 주워들었다.", "새하얀 칼날이 달빛에 반짝인다."] }
        ];

        const SCENES = [
            { id: 1, title: "D-29 | 장례식장", bgm: AUDIO_ASSETS.BGM_SCENE_1, subScenes: [{ id: 0, name: "빈소", bg: "https://i.ibb.co/CpNs8gQp/image.jpg" }, { id: 1, name: "식당", bg: "https://i.ibb.co/Mx45KCWL/image.jpg" }, { id: 2, name: "접견실", bg: "https://i.ibb.co/5hymyDbg/image.jpg" }], initialDialogues: ["사람이 많이 빠져나간 장례식장이다.", "부드러운 주홍색 조명이 살갗을 꿰뚫는 듯한 기분이 든다.", "죽음을 실체화하는 가장 마지막의 단계, 장례.", "그리고 그것을 모두에게 각인시키는 장소.", "...이기 때문이라고 생각한다."], clearDialogues: ["마지막으로 장례식장을 둘러보는 동안 사람이 더 빠져나간 모양이다.", "고요하다.", "자신에게 향하고 있는 시선을 읽어낸다.", "걱정스러움이다.", "하지만 특별히 말을 걸어 괜찮다고 하고 싶지는 않았다.", "그럴 필요를 느끼지 못했을 뿐더러....", "...괜찮은 건지 잘 모르겠다.", "괜찮지 않다면 괜찮지 않은 건 또 무엇인지.", "어떤 반응을 해야하는 건지.", "무엇도 모르겠다.", "이상하게 붕 뜨는 걸음을 딛어 몸을 돌렸다.", "집으로 가는 길은 잊지 않아 다행인 일이다."] },
            { id: 2, title: "D-26 | 연두마을", bgm: AUDIO_ASSETS.BGM_SCENE_2, subScenes: [{ id: 0, name: "거실", bg: "https://i.ibb.co/bM4nHjYx/image.jpg" }, { id: 1, name: "다락방", bg: "https://i.ibb.co/FLKJN0Cc/image.png" }, { id: 2, name: "침실", bg: "https://i.ibb.co/Y44ybbWc/image.jpg" }], initialDialogues: ["문고리에 닿은 손으로부터 전해지는 한기에서부터 느꼈지만, 3일만의 집은 냉랭하다.", "우리 집.", "...보다는, 꼭 남의 집처럼.", "집안일이라고는 하나도 되어 있지 않은 집은 눈으로만 보아도 어지럽다.", "하지만 막상 무언가를 시작하려니 결심보다 빠른 건 필요의 부재를 느껴버린 머리의 포기 선언이었다.", "...급한 것만 해결해두도록 하자."], clearDialogues: ["졸음이 쏟아진다.", "시야가 암전하기 직전, 벽에 걸린 상패가 눈에 들었다.", "해야할 일.", "행선지가 정해졌다.", "그대로 눈을 감았다."] },

            const playClickSfx = () => {
                if (sfxClickRef.current && !isMuted) {
                    try { sfxClickRef.current.currentTime = 0; sfxClickRef.current.play().catch(() => {}); } catch (err) {}
                }
            };

            const playPaperSfx = () => {
                if (sfxPaperRef.current && !isMuted) {
                    try { sfxPaperRef.current.currentTime = 0; sfxPaperRef.current.play().catch(() => {}); } catch (err) {}
                }
            };

                    const phrases = ["30일의 공백으로부터", "......", "축복의 수몰까지, 앞으로 ■■"];
                    const typingSpeed = 180; 

                    if (endStep < phrases.length) {
                        let charIndex = 0;
                        const target = phrases[endStep];
                        const timer = setInterval(() => {
                            setTypedTexts(prev => {
                                const next = [...prev];
                                next[endStep] = target.slice(0, charIndex + 1);
                                return next;
                            });
                            charIndex++;
                            if (charIndex >= target.length) {
                                clearInterval(timer);
                                setTimeout(() => setEndStep(prev => prev + 1), 800); 
                            }
                        }, typingSpeed);
                        return () => clearInterval(timer);
                    } else if (endStep === phrases.length && !isEndComplete) {
                        setIsEndComplete(true);
                        setTimeout(() => {
                            setGameState('EPILOGUE');
                            startDialogue(EPILOGUE_DIALOGUES);
                        }, 3000);
                    }
                }
            }, [gameState, endPhase, endStep, isEndComplete]);

            useEffect(() => {
                if (gameState === 'EXPLORE' && isSceneCleared && !isSceneClearing && !isDialogueActive && !selectedItem) {
                    setIsSceneClearing(true);
                    startDialogue(currentScene.clearDialogues);
                }
            }, [foundItems, isSceneCleared, isDialogueActive, selectedItem, gameState, currentScene?.clearDialogues, isSceneClearing]);

            useEffect(() => {
                const initAudio = () => {
                    try {
                        if (!bgmRef.current) { bgmRef.current = new Audio(); bgmRef.current.loop = true; }
                        if (!sfxClickRef.current) { sfxClickRef.current = new Audio(AUDIO_ASSETS.SFX_CLICK); sfxClickRef.current.preload = "auto"; }
                        if (!sfxPaperRef.current) { sfxPaperRef.current = new Audio(AUDIO_ASSETS.SFX_PAPER); sfxPaperRef.current.preload = "auto"; }
                    } catch (e) { console.error("Audio Initialization Error Handle", e); }
                };
                initAudio();
                return () => { if (bgmRef.current) bgmRef.current.pause(); };
            }, []);

            useEffect(() => {
                if ((gameState === 'EXPLORE' || gameState === 'EPILOGUE') && bgmRef.current && currentScene && currentScene.bgm) {
                    const playBgm = async () => {
                        try {
                            if (isMuted) { bgmRef.current.pause(); return; }
                            if (bgmRef.current.src !== currentScene.bgm) {
                                bgmRef.current.src = currentScene.bgm;
                                bgmRef.current.load();
                            }
                            await bgmRef.current.play();
                        } catch (err) {}
                    };
                    playBgm();
                }
            }, [currentSceneIdx, gameState, isMuted, currentScene?.bgm]);

            const handleStart = () => {
                [sfxClickRef, sfxPaperRef, bgmRef].forEach(ref => { if (ref.current) { try { ref.current.load(); } catch(e) {} } });
                playClickSfx();
                setGameState('EXPLORE');
                startDialogue(currentScene.initialDialogues);
            };

            const startDialogue = (dialogues, item = null) => {
                setDialogueQueue(dialogues); setDialogueStep(0); setIsDialogueActive(true); setItemAfterDialogue(item);
            };

            const handleNextDialogue = () => {
                playClickSfx();
                if (dialogueStep < dialogueQueue.length - 1) { setDialogueStep(dialogueStep + 1); } 
                else {
                    setIsDialogueActive(false);
                    if (itemAfterDialogue) { 
                        playPaperSfx(); setSelectedItem(itemAfterDialogue);
                        if (!foundItems.includes(itemAfterDialogue.id)) { setFoundItems([...foundItems, itemAfterDialogue.id]); }
                        setItemAfterDialogue(null);
                    } else if (isSceneClearing) { setIsSceneClearing(false); handleNextScene(); }
                }
            };

            const handleItemClick = (item) => { if (isDialogueActive) return; playClickSfx(); startDialogue(item.dialogues, item); };
            const handleNextScene = () => { if (currentSceneIdx < SCENES.length - 1) { setCurrentSceneIdx(currentSceneIdx + 1); setCurrentSubSceneIdx(0); startDialogue(SCENES[currentSceneIdx + 1].initialDialogues); } else { setGameState('END'); } };
            const handleCaseFileItemClick = (item) => { if (foundItems.includes(item.id)) { playPaperSfx(); setSelectedItem(item); } };

                                </button>

                                    {isMuted ? <Icon name="volume-x" size={12} /> : <Icon name="volume-2" size={12} />}
                                </button>
                            </div>

                                <>
                                    {currentSubSceneIdx > 0 && <button onClick={() => { playClickSfx(); setCurrentSubSceneIdx(currentSubSceneIdx - 1); }} className="absolute left-4 top-1/2 -translate-y-1/2 p-2 bg-black/60 border border-white hover:bg-white hover:text-black transition-all"><Icon name="chevron-left" size={24} /></button>}
                                    {currentSubSceneIdx < (currentScene.subScenes.length - 1) && <button onClick={() => { playClickSfx(); setCurrentSubSceneIdx(currentSubSceneIdx + 1); }} className="absolute right-4 top-1/2 -translate-y-1/2 p-2 bg-black/60 border border-white hover:bg-white hover:text-black transition-all"><Icon name="chevron-right" size={24} /></button>}
                                </>
                            )}

                            {!isDialogueActive && ITEMS.filter(i => i.scene === currentScene.id && i.subSceneIdx === currentSubSceneIdx).map((item) => (
                                <button key={item.id} onClick={() => handleItemClick(item)} className="absolute p-2 bg-white/20 hover:bg-white/40 rounded-full transition-transform hover:scale-110 active:scale-90 border border-white/50 group" style={{ top: item.pos.top, left: item.pos.left }}>
                                    <Icon name="search" size={20} className={foundItems.includes(item.id) ? "text-green-400" : "text-white"} />
                                </button>
                            ))}

                            {isDialogueActive && (
                                <div className="absolute bottom-4 left-4 right-4 dialogue-box p-5 min-h-[90px] cursor-pointer z-20" onClick={handleNextDialogue}>
                                    <p className="text-[10px] leading-relaxed text-left px-4 whitespace-pre-wrap">{dialogueQueue[dialogueStep]}</p>
                                    <div className="absolute bottom-2 right-4 animate-bounce text-zinc-400"><Icon name="chevron-down" size={14} /></div>
                                </div>
                            )}

                            <div className="absolute bottom-4 right-4 flex gap-4 z-10 items-end">
                                {hasFoundScene5Item && (
                                    <div className="flex flex-col items-center">
                                        <button onClick={() => { playPaperSfx(); setShowQuestionMemory(true); }} className="p-3 bg-black/80 border border-white hover:bg-zinc-800 transition-colors relative"><Icon name="ghost" size={20} className="text-purple-300" /></button>
                                        <div className="mt-0.5 bg-black text-[6px] px-1 border border-white whitespace-nowrap">?의 기억</div>
                                    </div>
                                )}
                                <div className="flex flex-col items-center">
                                    <button onClick={() => { playPaperSfx(); setShowCaseFile(true); }} className="p-3 bg-black/80 border border-white hover:bg-zinc-800 transition-colors relative"><Icon name="file-text" size={20} /></button>
                                    <div className="mt-0.5 bg-black text-[6px] px-1 border border-white whitespace-nowrap">기억 조각</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- Item Detail Popup --- (max-w-2xl) */}
                    {selectedItem && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/95 p-4">
                            <div className="relative w-full max-w-2xl bg-zinc-800 border border-white p-8 text-left">
                                <button onClick={() => { playClickSfx(); setSelectedItem(null); }} className="absolute top-4 right-4 hover:text-red-500"><Icon name="x" size={24} /></button>
                                <div className="flex flex-row items-start gap-8">
                                    <div className="w-48 h-48 bg-zinc-700 border border-zinc-600 flex-shrink-0 overflow-hidden"><img src={selectedItem.image} alt={selectedItem.name} className="w-full h-full object-cover" /></div>
                                    <div className="flex-1">
                                        <h3 className="text-sm mb-6 text-white font-bold">{selectedItem.name}</h3>
                                        <div className="bg-black/30 p-4 border border-zinc-700"><p className="text-[10px] leading-relaxed text-zinc-300 tracking-tighter whitespace-pre-wrap">{selectedItem.description}</p></div>
                                    </div>
                                </div>
                                <button onClick={() => { playClickSfx(); setSelectedItem(null); }} className="mt-8 pixel-btn text-[8px] w-full">닫기</button>
                            </div>
                        </div>
                    )}

                    {/* --- Map Modal --- (max-w-md) */}
                    {showMap && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 p-4">
                            <div className="w-full max-w-md bg-zinc-900 border-2 border-white p-6 relative overflow-hidden">
                                <button onClick={() => { playClickSfx(); setShowMap(false); }} className="absolute top-2 right-2 hover:text-red-500 p-1 z-50"><Icon name="x" size={24} /></button>
                                <div className="mb-4 flex flex-col items-center">
                                    <h2 className="text-xs text-yellow-400 mb-1 font-bold">{isHisui ? "히스이지방" : "성도지방"}</h2>
                                    {!isHisui && !MAP_CONFIG.nodes.some(n => n.label?.replace('\n', '') === currentLocationName) ? (
                                        <div className="flex items-center gap-2 text-red-500 bg-red-950/30 px-2 py-1 border border-red-900"><Icon name="alert-circle" size={10} /><span className="text-[7px]">해당 위치 확인 불가</span></div>
                                    ) : (!isHisui && <div className="text-[7px] text-green-400">현재 위치: {currentLocationName}</div>)}
                                </div>
                                <div className="relative w-full aspect-[4/3] bg-zinc-800 border-2 border-zinc-700 p-2">
                                    <svg viewBox="0 0 320 220" className="w-full h-full shadow-inner">
                                        {isHisui ? (
                                            <g>
                                                <rect x="135" y="85" width="50" height="50" fill="#22c55e" stroke="white" strokeWidth="2" className="map-active-node" />
                                                <text x="160" y="155" textAnchor="middle" fill="white" fontSize="10" fontWeight="bold">순백동토</text>
                                            </g>
                                        ) : (
                                            <>
                                                {MAP_CONFIG.paths.map((p, i) => (
                                                    <g key={`path-${i}`}>
                                                        <path d={p.points} fill="none" stroke="white" strokeWidth="2.8" strokeLinecap="square" />
                                                        {p.junction && <rect x={p.jPos.x} y={p.jPos.y} width={8} height={8} fill="#3f3f46" stroke="black" strokeWidth="1" />}
                                                    </g>
                                                ))}
                                                {MAP_CONFIG.nodes.map((node) => {
                                                    const isHighlighted = node.label?.replace('\n', '') === currentLocationName;
                                                    const nodeColor = isHighlighted ? "#22c55e" : (node.label ? "#71717a" : "#3f3f46");
                                                    return (
                                                        <g key={node.id}>
                                                            <rect x={node.x} y={node.y} width={node.w} height={node.h} fill={nodeColor} stroke={isHighlighted ? "white" : "black"} strokeWidth="1.2" className={isHighlighted ? "map-active-node" : ""} />
                                                            {node.dot && <circle cx={node.x + node.w - 5} cy={node.y + 5} r="2.5" fill="#facc15" stroke="black" strokeWidth="0.8" />}
                                                            {node.doubleDot && <circle cx={node.x + 5} cy={node.y + 5} r="2.5" fill="#facc15" stroke="black" strokeWidth="0.8" />}
                                                            {node.label && (
                                                                <text x={node.labelRight ? node.x + node.w + 6 : node.x + node.w / 2} y={node.labelTop ? node.y - 8 : (node.labelRight ? node.y + 15 : node.y + node.h + 12)} textAnchor={node.labelRight ? "start" : "middle"} fill="white" fontSize="7" fontWeight="bold" style={{ pointerEvents: 'none' }}>
                                                                    {node.label.split('\n').map((line, idx) => (<tspan key={idx} x={node.labelRight ? node.x + node.w + 6 : node.x + node.w / 2} dy={idx === 0 ? 0 : 8}>{line}</tspan>))}
                                                                </text>
                                                            )}
                                                        </g>
                                                    );
                                                })}
                                            </>
                                        )}
                                    </svg>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- Case File --- (max-w-2xl) */}
                    {showCaseFile && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/90 p-4">
                            <div className="w-full max-w-2xl bg-zinc-900 border border-white p-6 max-h-[85vh] flex flex-col">
                                <div className="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4"><h2 className="text-xs flex items-center gap-3"><Icon name="file-text" size={18} /> 기억 조각</h2><button onClick={() => { playClickSfx(); setShowCaseFile(false); }}><Icon name="x" size={24} /></button></div>
                                <div className="flex-1 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 gap-4 pr-2 custom-scrollbar">
                                    {ITEMS.filter(item => item.scene !== 5).map((item, idx) => {
                                        const isFound = foundItems.includes(item.id);
                                        return (
                                            <div key={`frag-${item.id}-${idx}`} onClick={() => { if(isFound) { playPaperSfx(); setSelectedItem(item); } }} className={`p-3 border transition-all ${isFound ? 'border-white bg-zinc-800 cursor-pointer hover:bg-zinc-700' : 'border-dashed border-zinc-700 opacity-40 cursor-default'}`}>
                                                <div className="flex gap-4">
                                                    <div className="w-16 h-16 bg-zinc-700 flex-shrink-0">{isFound && <img src={item.image} className="w-full h-full object-cover" />}</div>
                                                    <div className="flex flex-col justify-center"><p className={`text-[10px] ${isFound ? 'text-yellow-400' : 'text-zinc-600'}`}>{isFound ? item.name : "데이터 없음"}</p>{isFound && <p className="text-[7px] text-zinc-500 mt-1 text-left">{getItemLocationName(item)}</p>}</div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- Question Memory --- (max-w-2xl) */}
                    {showQuestionMemory && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/90 p-4">
                            <div className="w-full max-w-2xl bg-zinc-900 border border-white p-6 max-h-[85vh] flex flex-col shadow-[0_0_20px_rgba(168,85,247,0.4)]">
                                <div className="flex justify-between items-center mb-6 border-b border-purple-800 pb-4"><h2 className="text-xs flex items-center gap-3 text-purple-400"><Icon name="ghost" size={18} /> ?의 기억</h2><button onClick={() => { playClickSfx(); setShowQuestionMemory(false); }}><Icon name="x" size={24} /></button></div>
                                <div className="flex-1 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 gap-4 pr-2 custom-scrollbar">
                                    {ITEMS.filter(item => item.scene === 5).map((item, idx) => {
                                        const isFound = foundItems.includes(item.id);
                                        return (
                                            <div key={`mem-${item.id}-${idx}`} onClick={() => { if(isFound) { playPaperSfx(); setSelectedItem(item); } }} className={`p-3 border transition-all ${isFound ? 'border-white bg-zinc-800 cursor-pointer hover:bg-purple-900/30' : 'border-dashed border-zinc-700 opacity-40 cursor-default'}`}>
                                                <div className="flex gap-4">
                                                    <div className="w-16 h-16 bg-zinc-700 flex-shrink-0">{isFound && <img src={item.image} className="w-full h-full object-cover" />}</div>
                                                    <div className="flex flex-col justify-center"><p className={`text-[10px] ${isFound ? 'text-purple-300' : 'text-zinc-600'}`}>{isFound ? item.name : "결여된 기억"}</p>{isFound && <p className="text-[7px] text-zinc-500 mt-1 text-left">{getItemLocationName(item)}</p>}</div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- End Screen (Interactive Sequence) --- */}
                    {gameState === 'END' && (
                        <div className="flex flex-col items-center justify-center text-center p-8 fade-in-screen w-full h-full bg-black relative">
                            {endPhase === 'IMAGE' ? (
                                <div 
                                    className="w-48 h-48 cursor-pointer active:scale-95 transition-all duration-1000 flex items-center justify-center overflow-hidden" 
                                    onClick={() => { playClickSfx(); setEndPhase('TYPING'); }}
                                >
                                    <img src="https://i.ibb.co/xKsxz8wT/image.png" alt="Ending Logo" className="w-full h-full object-contain p-2" />
                                </div>
                            ) : (
                                <div className="flex flex-col items-center gap-6">
                                    <h1 className="text-sm leading-loose tracking-widest min-h-[1.5em]" style={pixelFontStyle}>
                                        {typedTexts[0]}
                                    </h1>
                                    <p className="text-xs leading-relaxed min-h-[1.5em] text-zinc-400" style={pixelFontStyle}>
                                        {typedTexts[1]}
                                    </p>
                                    <p className="text-[10px] leading-relaxed min-h-[1.5em] tracking-tighter" style={pixelFontStyle}>
                                        {typedTexts[2]}
                                    </p>
                                </div>
                            )}
                        </div>
                    )}

                    {/* --- Epilogue Screen --- */}
                    {gameState === 'EPILOGUE' && (
                        <div className="fixed inset-0 z-[100] bg-black flex items-center justify-center p-8">
                            {isDialogueActive && (
                                <div className="w-full max-w-2xl dialogue-box p-10 min-h-[180px] cursor-pointer relative" onClick={handleNextDialogue}>
                                    <p className="text-[10px] leading-loose text-left px-4 whitespace-pre-wrap">{dialogueQueue[dialogueStep]}</p>
                                    <div className="absolute bottom-4 right-6 animate-bounce text-zinc-400"><Icon name="chevron-down" size={18} /></div>
                                </div>
                            )}
                            {!isDialogueActive && (
                                <div className="flex flex-col items-center text-center w-full max-w-4xl">
                                    <img 
                                        src="https://i.ibb.co/0yJKc6ZY/16-9.png" 
                                        alt="End of Investigation" 
                                        className="w-full h-auto object-contain p-4 fade-in-final" 
                                    />
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
